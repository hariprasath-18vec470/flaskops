name: FlaskOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/flaskops

jobs:

  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install dependencies
      run: |
        pip install -r app/requirements.txt
        pip install pytest pytest-flask flake8

    - name: Run tests
      run: |
        cd app
        python -m pytest tests/ -v --tb=short

    - name: Lint
      run: flake8 app/app.py --max-line-length=100 --ignore=E501,W503

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: test
    steps:

    - uses: actions/checkout@v4

    - name: Trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        severity: HIGH,CRITICAL
        exit-code: '0'
        format: table

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:

    - uses: actions/checkout@v4

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_IMAGE }}
        tags: |
          type=sha,prefix=sha-,format=short
          type=raw,value=latest

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  update-helm:
    name: Update image tag in Helm
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:

    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update values.yaml with new image tag
      run: |
        IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
        echo "New tag: $IMAGE_TAG"
        sed -i "s/  tag: .*/  tag: \"$IMAGE_TAG\"/" helm/flaskops/values.yaml
        grep "tag:" helm/flaskops/values.yaml

    - name: Commit and push tag update
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add helm/flaskops/values.yaml
        git commit -m "ci: update image tag to sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
        git push
