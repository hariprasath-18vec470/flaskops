image:
  repository: hariprasathshanmugaraj/flaskops
  tag: "sha-94ba5a5"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 80
  targetPort: 5000

ingress:
  enabled: true
  host: flaskops.local

config:
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "96Mi"
    cpu: "150m"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 60

probes:
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 20
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
